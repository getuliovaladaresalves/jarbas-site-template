services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - DATABASE_URI=${DATABASE_URI_STAGING:-file:./data/staging.db}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_STAGING_URL:-http://localhost:3001}
    volumes:
      - staging_media:/app/public/media
      - staging_data:/app/data
    restart: unless-stopped

volumes:
  staging_media:
  staging_data:
